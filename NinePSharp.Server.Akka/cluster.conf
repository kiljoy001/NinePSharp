# NinePSharp Cluster Configuration
# SystemName must be identical on all nodes
SystemName = NinePCluster

# This node's identity
Hostname = localhost
Port = 8081
Role = backend
# Optional transport overrides for NAT / multi-homed hosts
# BindHostname = 0.0.0.0
# BindPort = 8081
# PublicHostname = 203.0.113.10
# PublicPort = 8081
#
# Optional interface pinning (useful for Yggdrasil, WireGuard, etc.)
# InterfaceName = ygg0
# PreferIPv6 = true

# Seed Nodes (Entry points to the cluster)
# Use the format: akka.tcp://SystemName@hostname:port
Seed = akka.tcp://NinePCluster@localhost:8081
# Seed = akka.tcp://NinePCluster@192.168.1.11:8081
